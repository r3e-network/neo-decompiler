name: Publish Web Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-web:
    name: Publish npm package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108 --locked

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Verify package version sync
        working-directory: web
        run: npm run version:check

      - name: Run web package tests
        working-directory: web
        run: npm test

      - name: Verify web package tarball contents
        working-directory: web
        run: npm run verify:pack

      - name: Publish web package with trusted publishing
        if: ${{ env.NPM_TOKEN == '' }}
        working-directory: web
        run: npm publish

      - name: Publish web package with npm token
        if: ${{ env.NPM_TOKEN != '' }}
        working-directory: web
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npm publish --provenance=false
